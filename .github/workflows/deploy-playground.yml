name: Deploy Playground to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Generate contracts.js
        run: ./playground/generate_contracts.sh

      - name: Build WASM package
        run: wasm-pack build --target web --out-dir playground/pkg --features wasm

      - name: Clean up WASM package artifacts
        run: |
          rm -f playground/pkg/.gitignore
          rm -f playground/pkg/package.json
          rm -f playground/pkg/README.md

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: playground
          target-folder: .
          clean: true
          clean-exclude: |
            pr-previews/
